name: Security Debugger

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # allow manual run

permissions:
  contents: write
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    outputs:
      issues_found: ${{ steps.scan.outputs.issues_found }}
    steps:
      - uses: actions/checkout@v4

      - name: Run security debugger scan
        id: scan
        run: python security_debugger.py --output report.md
        shell: bash

      - name: Upload report artifact (optional)
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: report.md

  comment-on-pr:
    needs: scan
    if: github.event_name == 'pull_request' && needs.scan.outputs.issues_found == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: security-report
      - name: Post PR comment
        uses: thollander/actions-comment-pull-request@v2
        with:
          filePath: report.md
          comment_tag: security-debugger

  create-report-pr:
    needs: scan
    if: github.event_name != 'pull_request' && needs.scan.outputs.issues_found == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: security-report
      - name: Create pull request with report
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'security: debug/security report'
          title: '🔒 Security Debugger Report'
          body: 'Automated security scan found issues. Full details in the report.md file.'
          branch: security-report
          branch-suffix: timestamp
          add-paths: report.md
          delete-branch: true
