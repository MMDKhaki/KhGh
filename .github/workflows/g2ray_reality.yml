name: G2Ray Reality Panel (Auto - Iran)

on:
  workflow_dispatch:          # امکان اجرای دستی
  schedule:
    # اجرای خودکار هر ۴ ساعت برای تمدید IP
    - cron: '0 */4 * * *'

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 360      # حداکثر زمان ۶ ساعت (محدودیت گیت‌هاب)

    steps:
    - name: دریافت کدها
      uses: actions/checkout@v4

    - name: اجرای اسکریپت اصلی G2Ray
      run: |
        chmod +x g2ray_panel.py
        python3 g2ray_panel.py
