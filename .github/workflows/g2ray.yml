name: G2Ray Reality Config Generator

on:
  workflow_dispatch:
    inputs:
      sni_mode:
        description: 'Select target SNI'
        required: true
        type: choice
        default: 'auto'
        options:
          - auto
          - backup
          - github
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip openssh-client tar curl

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: pip install qrcode[pil]

      - name: Run G2Ray Panel
        run: |
          MODE="${{ github.event.inputs.sni_mode }}"
          if [ "$MODE" = "github" ]; then
            python3 g2ray_panel.py --github
          elif [ "$MODE" = "backup" ]; then
            python3 g2ray_panel.py 
          else
            python3 g2ray_panel.py
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: g2ray-config
          path: |
            vless_link.txt
            qr.png
            config_summary.json
