name: G2Ray Reality Panel

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - name: نصب پیش‌نیازها
        run: sudo apt-get update -qq && sudo apt-get install -y -qq openssh-client unzip
      - name: اجرای G2Ray
        run: python3 g2ray_panel.py --backup
