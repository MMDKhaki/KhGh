name: G2Ray Reality Auto Panel

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'   # هر ۴ ساعت تمدید IP

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 350     # نزدیک به ۶ ساعت

    steps:
      - name: دریافت کد
        uses: actions/checkout@v4

      - name: نصب پیش‌نیازها
        run: sudo apt-get update -qq && sudo apt-get install -y -qq openssh-client unzip curl

      - name: اجرای پنل G2Ray
        run: python3 g2ray_panel.py --backup   # فعال‌سازی حالت پشتیبان سایت‌ها
