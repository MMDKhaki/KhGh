version: 2
updates:
  # 1. Daily security updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"              # Check every day
      time: "00:00"                  # Midnight check (optional)
    labels:
      - "dependencies"
      - "github-actions"
      - "high-security"              # Label for security PRs
    commit-message:
      prefix: "🔒 SECURITY"
      include: "scope"
    # Only create PRs for security updates
    open-pull-requests-limit: 10
