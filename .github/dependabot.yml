version: 2
updates:
  # ۱. به‌روزرسانی خودکار اکشن‌های GitHub (workflowها)
  - package-ecosystem: "github-actions"
    directory: "/"                 # دایرکتوری‌ای که workflows/ داخلشه
    schedule:
      interval: "weekly"
      day: "sunday"                # اختیاری؛ هر هفته یکشنبه
    labels:
      - "dependencies"
      - "github-actions"
      
  # ۲. اگه بعداً requirements.txt یا Pipfile اضافه کردی این بخش رو فعال کن
  # - package-ecosystem: "pip"
  #   directory: "/"
  #   schedule:
  #     interval: "weekly"
