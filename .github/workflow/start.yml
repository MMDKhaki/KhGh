name: Auto Generate VLESS Config

on:
  schedule:
    - cron: "0 */6 * * *"  # هر 6 ساعت یکبار
  workflow_dispatch:  # امکان اجرای دستی

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # حداکثر زمان اجرا: ۱۰ دقیقه
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qrencode curl unzip

      - name: Install python packages
        run: pip install requests

      - name: Run config generator
        run: python main.py

      - name: Upload config artifact
        uses: actions/upload-artifact@v4
        with:
          name: vless-config-${{ github.run_id }}
          path: |
            config_output.txt
            config_qr.png
            xray_config.json
          retention-days: 1  # خودکار بعد از 1 روز پاک شود
