name: Readme Debugger (sik)

on:
  schedule:
    # Runs every day at 12:00 UTC
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update README with scan timestamp
        run: |
          echo "Last debugger scan: $(date -u +%Y-%m-%dT%H:%M:%SZ)" > scan-status.txt
          # Append to README if it doesn't have the section
          if ! grep -q "## 🔍 Security Scan Status" README.md; then
            echo -e "\n## 🔍 Security Scan Status\n<!-- debugger_start -->\n<!-- debugger_end -->" >> README.md
          fi
          # Replace the content between markers
          sed -i '/<!-- debugger_start -->/,/<!-- debugger_end -->/{/<!-- debugger_start -->/!{/<!-- debugger_end -->/!d}}' README.md
          sed -i '/<!-- debugger_start -->/r scan-status.txt' README.md
          rm scan-status.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update debugger scan timestamp"
          git push